version: 2

env:
  - REGISTRY={{ envOrDefault "REGISTRY" "ghcr.io" }}
  - IS_RELEASE={{ envOrDefault "IS_RELEASE" "false" }}

before:
  hooks:
    - go mod tidy
    - cd server && templ generate

builds:
  - id: server
    env: ["CGO_ENABLED=0"]
    main: ./cmd/server
    binary: server/NanoKVM-Server
    goos:
      - linux
    goarch:
      - riscv64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

  - id: fw_env
    env: ["CGO_ENABLED=0"]
    main: ./cmd/fw_env
    binary: fw_env
    goos:
      - linux
    goarch:
      - riscv64
    ldflags:
      - -s -w

upx:
  - enabled: true
    ids:
      - server
      - fw_env
    compress: best
    lzma: true

archives:
  - id: nanokvm
    ids:
      - server
      - fw_env
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: packaging/etc/init.d/*
        dst: system/etc/init.d
        info:
          mode: 0755
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: BMCPi
    name: NanoKVM
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  make_latest: true

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  disable: '{{ if eq .Env.IS_RELEASE "true" }}false{{ else }}true{{ end }}'
